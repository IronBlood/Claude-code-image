name: Manual Docker Build

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-base-and-runtime:
    runs-on: ubuntu-latest

    env:
      CONTAINER_HOME: /home/claude
      RUNTIME_IMAGE: claude-code-image:ci

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Derive image names
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "BASE_IMAGE=ghcr.io/${owner}/claude-code-image-base" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build shared base image
        run: docker build -f Dockerfile.base -t "$BASE_IMAGE" .

      - name: Push shared base image
        run: docker push "$BASE_IMAGE"

      - name: Build user-facing image
        run: docker build \
          --build-arg BASE_IMAGE="$BASE_IMAGE" \
          --build-arg CONTAINER_HOME="$CONTAINER_HOME" \
          -t "$RUNTIME_IMAGE" .

      - name: Check Claude on build default user
        run: |
          docker run --rm "$RUNTIME_IMAGE" which claude
          docker run --rm "$RUNTIME_IMAGE" claude --version

      - name: Check Claude with host-style UID and GID
        run: |
          docker run --rm --user 1001:1001 "$RUNTIME_IMAGE" which claude
          docker run --rm --user 1001:1001 "$RUNTIME_IMAGE" claude --version
