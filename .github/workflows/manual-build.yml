name: Manual Docker Build

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-base-and-runtime:
    runs-on: ubuntu-latest

    env:
      USERNAME: claude
      UID: 1000
      GID: 1000
      RUNTIME_IMAGE: claude-code-image:ci

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Derive image names
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "BASE_IMAGE=ghcr.io/${owner}/claude-code-image-base" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build shared base image
        run: docker build -f Dockerfile.base -t "$BASE_IMAGE" .

      - name: Push shared base image
        run: docker push "$BASE_IMAGE"

      - name: Check Claude as root in shared base image
        run: |
          docker run --rm "$BASE_IMAGE" which claude
          docker run --rm "$BASE_IMAGE" claude --version

      - name: Build user-facing image
        run: |
          docker build \
            --build-arg BASE_IMAGE="$BASE_IMAGE" \
            --build-arg USERNAME="$USERNAME" \
            --build-arg UID="$UID" \
            --build-arg GID="$GID" \
            -t "$RUNTIME_IMAGE" .

      - name: Check Claude as configured non-root user
        run: |
          docker run --rm "$RUNTIME_IMAGE" which claude
          docker run --rm "$RUNTIME_IMAGE" claude --version
